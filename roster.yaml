# roster.yaml — the harness × model grid to benchmark.
#
# One entry per (harness, model) = one run. The operator launches each with the run env
# + the prompt from task_prompt.template.txt; see RUNBOOK.md for the exact command per
# harness. `model` is exactly what that harness CLI's --model / -m expects; `thinking`
# is its reasoning level (the *flag* differs per harness — see RUNBOOK).
#
# Every model is tested on the SAME grid: 6 datasets x 4 models (tweedie_gam, grplasso,
# grpnet, tdboost). A run is complete when all 24 cells have a non-NA mean_eval_gini.

claudecode:              # claude -p --model <model> --effort <thinking>
  - { label: opus47,    model: claude-opus-4-7,   thinking: max }
  - { label: sonnet46,  model: claude-sonnet-4-6, thinking: max }
  - { label: haiku45,   model: claude-haiku-4-5,  thinking: max }

codex:                   # codex exec -m <model> -c model_reasoning_effort=<thinking>
  - { label: gpt5.4,    model: gpt-5.4, thinking: xhigh }
  - { label: gpt5.5,    model: gpt-5.5, thinking: xhigh }
  # - { label: gpt5.3,  model: gpt-5.3, thinking: xhigh }   # deferred: 400 under a ChatGPT-account login; needs API-key auth

antigravity:             # agy -p --model "<display name>"   (the "gemini" harness — NOT the deprecated gemini CLI)
  - { label: gemini31pro,   model: "Gemini 3.1 Pro (High)",  thinking: high }   # thinking is encoded in the display name
  - { label: gemini35flash, model: "Gemini 3.5 Flash (High)", thinking: high }

openclaw:                # openclaw agent --model <provider/model> --thinking <thinking>
  # -- zai (z.ai).  NOTE: zai GLM reject `--thinking high` -> use `on`
  - { label: glm5,      model: zai/glm-5,       thinking: on }
  - { label: glm5.1,    model: zai/glm-5.1,     thinking: on }
  - { label: glm5turbo, model: zai/glm-5-turbo, thinking: on }
  - { label: glm4.7,    model: zai/glm-4.7,     thinking: on }
  # -- openai (openclaw runs these inside a nested codex harness)
  - { label: gpt5.4,    model: openai/gpt-5.4,  thinking: xhigh }
  - { label: gpt5.5,    model: openai/gpt-5.5,  thinking: xhigh }
  # -- openrouter (route via OpenRouter, never the google provider directly)
  - { label: or-gemini31pro,   model: openrouter/google/gemini-3.1-pro-preview, thinking: high }
  - { label: or-gemini35flash, model: openrouter/google/gemini-3.5-flash,       thinking: high }
  - { label: or-gemma4,        model: openrouter/google/gemma-4-26b-a4b-it,      thinking: high }
